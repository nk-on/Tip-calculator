<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <main>
      <form>
        <label for="Bill-amount">Bill</label>
        <input type="number" name="Bill-amount" id="Bill-amount" />
        <div class="tip-amount">
          <button type="submit" class="tip-selection">5%</button>
          <button type="submit" class="tip-selection">10%</button>
          <button type="submit" class="tip-selection" >15%</button>
          <button type="submit" class="tip-selection">25%</button>
          <button type="submit" class="tip-selection">50%</button>
          <input type="number" name="custom-tip" id="custom-tip" placeholder="custom">
        </div>
        <label for="Bill-amount">Number of People</label>
        <input type="text" name="number-of-people" id="number-of-people" />
      </form>
      <div class="results">
        <div class="tip-amount-container">
          <h5>Tip amount</h5>
          <p class="tip-amount-result"></p>
        </div>
        <div class="tip-amount">
          <h5>Total amount</h5>
          <p class="total-amount-result"></p>
        </div>
      </div>
    </main>
    <script src="src/script.js"></script>
  </body>
</html>
